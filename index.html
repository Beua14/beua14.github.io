<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beua14 Store | Aplicativos Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0066ff;
            --primary-dark: #0052cc;
            --secondary: #00d4aa;
            --bg-start: #0f0f23;
            --bg-end: #1a1a3e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: var(--primary);
            top: -10%;
            right: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--secondary);
            bottom: -5%;
            left: -5%;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: #ff6b9d;
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
            animation: fadeInDown 0.8s ease;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo-svg {
            width: 80px;
            height: 80px;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 35px;
        }

        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            transition: 0.3s;
        }

        .app-card:hover {
            transform: translateY(-5px);
        }

        .icon-box {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            overflow: hidden;
        }

        .icon-box img {
            width: 100%;
            height: 100%;
        }

        h3 {
            font-size: 1.5rem;
        }

        .description {
            color: var(--text-secondary);
            margin: 15px 0;
        }

        .btn-install {
            background: var(--primary);
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .stats {
            margin-top: 80px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
        }

        footer {
            margin-top: 100px;
            text-align: center;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

<div class="bg-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="container">

<header>
    <h1>Beua14 Store</h1>
    <p class="subtitle">Aplicações Premium Verificadas</p>
</header>

<div class="app-grid">

    <!-- NOVO APP PRIMEIRO -->
    <div class="app-card">
        <div class="icon-box">
            <img src="logo-vazoux.png">
        </div>
        <h3>Vazados Angola</h3>
        <p class="description">Este app é exclusivamente para maiores de 18 anos.</p>
        <p><strong id="downloads-4">0</strong> downloads</p>
        <a href="https://www.mediafire.com/file/1etpo9jsgxlbau3/Vazoux.apk/file" target="_blank" class="btn-install" onclick="incrementDownload(4)">Instalar</a>
    </div>

    <!-- APP ORIGINAL 1 -->
    <div class="app-card">
        <div class="icon-box">
            <img src="logo-servico.png">
        </div>
        <h3>Papoite dos Serviços</h3>
        <p class="description">A tua solução está aqui.</p>
        <p><strong id="downloads-1">757</strong> downloads</p>
        <a href="https://www.mediafire.com/file/c8ivp9qlkuzk9xr/Papoite_dos_servicos.apk/file" target="_blank" class="btn-install" onclick="incrementDownload(1)">Instalar</a>
    </div>

</div>

<div class="stats">
    <div class="stat-number">4</div>
    <div>Apps Disponíveis</div>
</div>

<footer>
    <p>© 2025 Beua14 Store</p>
</footer>

</div>

<script>
function incrementDownload(id){
    let el = document.getElementById("downloads-"+id);
    el.textContent = parseInt(el.textContent)+1;
}
</script>

</body>
</html>
