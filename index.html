<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beua14 Store | Meus Aplicativos</title>

    <style>
        :root {
            --google-green: #01875f;
            --sky-blue: #a1c4fd;
            --sky-light: #c2e9fb;
            --text-dark: #2c3e50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--sky-light) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .cloud {
            position: fixed;
            color: white;
            opacity: 0.5;
            filter: blur(2px);
            z-index: -1;
            font-size: 100px;
            user-select: none;
        }

        header { text-align: center; margin-bottom: 50px; z-index: 1; }
        header h1 { color: var(--text-dark); font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        header p { color: #576574; font-weight: 600; background: rgba(255, 255, 255, 0.3); padding: 5px 15px; border-radius: 20px; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
            z-index: 1;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            transition: 0.3s ease;
        }

        .app-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.9);
        }

        .icon-box {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            overflow: hidden;
            border-radius: 22px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .category { font-size: 0.75rem; font-weight: 800; color: var(--google-green); text-transform: uppercase; margin-bottom: 10px; display: block; }
        h3 { color: var(--text-dark); font-size: 1.5rem; margin-bottom: 12px; }
        p.description { color: #5f6368; font-size: 0.95rem; line-height: 1.5; margin-bottom: 30px; min-height: 60px; }
